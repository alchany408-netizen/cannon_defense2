<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arc Shooter</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: none; gap: 12px; padding: 8px; }
  canvas { display: block; touch-action: none; max-height: 100vh; }
  #rp { color: #00ff00; font-family: "Malgun Gothic", monospace; font-size: 13px; min-width: 160px; max-width: 200px; align-self: flex-start; margin-top: 8px; }
  #rp h2 { margin: 0 0 6px 0; font-size: 15px; border-bottom: 1px solid #00ff00; padding-bottom: 4px; }
  #rl { list-style: none; margin: 0; padding: 0; }
  #rl li { padding: 3px 0; border-bottom: 1px solid #003300; display: flex; gap: 6px; font-size: 12px; }
  #rl li .rk { color: #555; width: 18px; flex-shrink: 0; }
  #rl li .nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #rl li .sc { color: #00ff00; flex-shrink: 0; }
  #name-setup input, #name-setup button { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 3px 5px; font-size: 12px; outline: none; }
  #name-setup button { cursor: pointer; }
  #name-setup button:hover { background: #003300; }
  #rs { font-size: 11px; color: #555; margin-top: 4px; }
</style>
</head>
<body>
<canvas id="c" width="700" height="700"></canvas>
<div id="rp">
  <h2>🏆 글로벌 랭킹</h2>
  <div id="name-setup" style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;">
    <div style="font-size:12px;color:#aaa">닉네임 설정:</div>
    <input id="ni" type="text" maxlength="12" placeholder="닉네임 (최대 12자)">
    <button onclick="saveName()">저장</button>
  </div>
  <div id="cur-name" style="display:none;font-size:12px;color:#aaa;margin-bottom:6px;"></div>
  <ul id="rl"><li style="color:#555">불러오는 중...</li></ul>
  <div id="rs"></div>
  <button id="reset-btn" style="margin-top:10px;background:#000;border:1px solid #333;color:#555;padding:3px 5px;font-size:11px;cursor:pointer;width:100%;">기록 초기화</button>
</div>

function b64ToBlob(b64, mime) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function circleCollide(x1, y1, r1, x2, y2, r2) {
  const dx = x1-x2, dy = y1-y2;
  return dx*dx + dy*dy <= (r1+r2)*(r1+r2);
}

function updateColor() {
  if (R===255 && G<255 && B===0) G = Math.min(255, G+colorSpeed);
  else if (G===255 && R>0 && B===0) R = Math.max(0, R-colorSpeed);
  else if (G===255 && B<255 && R===0) B = Math.min(255, B+colorSpeed);
  else if (B===255 && G>0 && R===0) G = Math.max(0, G-colorSpeed);
  else if (B===255 && R<255 && G===0) R = Math.min(255, R+colorSpeed);
  else if (R===255 && B>0 && G===0) B = Math.max(0, B-colorSpeed);
}

function spawnEnemy() {

  const c = ENEMY_SPAWNS[Math.random()*ENEMY_SPAWNS.length|0];

    vy: Math.abs(c.vy)===1 ? c.vy*sp : c.vy,
    size
  });
}

function spawnFake() {
  const sp = (Math.random()*5|0) + 2;
  const sizeReduction = score >= 5000 ? Math.floor((score-5000)/500)*5 : 0;
  const size = Math.max(10, 40 - sizeReduction);
  const pool = score >= 10000 ? [...FAKE_SPAWNS_BASIC, ...FAKE_SPAWNS_HARD] : FAKE_SPAWNS_BASIC;
  const c = pool[Math.random()*pool.length|0];
  const multiplier = c.fast ? sp*2 : sp;
  fakes.push({
    x:c.x, y:c.y,
    vx: Math.abs(c.vx)===1 ? c.vx*multiplier : c.vx*(sp/2),
    vy: Math.abs(c.vy)===1 ? c.vy*multiplier : c.vy*(sp/2),
    size,
    turn: c.turn||false, turnY: c.turnY||0,
    turnVx: c.turnVx ? c.turnVx*multiplier : 0, turned:false,
    pause: c.pause||false, pauseX: c.pauseX||0,
    paused:false, pauseTimer:0
  });
}

function update(delta) {
  updateColor();
  if (state !== "game") return;

  player_x = cx + Math.sin(angle)*arcR;
  player_y = cy - Math.cos(angle)*arcR;
  angle += asp * delta;
  if (angle >= maxAngle) { angle = maxAngle; asp = 0; }
  else if (angle <= minAngle) { angle = minAngle; asp = 0; }

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * delta;
    b.y += b.vy * delta;
    if (b.x < -20 || b.x > 720 || b.y < -20) {
      bullets.splice(i, 1);
      combo = 0;
    }
  }

  // Enemy spawn
  et -= delta;
  if (et <= 0) {
    spawnEnemy();
    if (bet > 30) bet--;
    et = bet;
  }

  // Fake spawn
  if (score >= 5000) {
    fet -= delta;
    if (fet <= 0) {
      spawnFake();
      fet = 60 + (Math.random()*60|0);
    }
  }

  // Enemy update
  for (let i = enemys.length-1; i >= 0; i--) {
    const e = enemys[i];
    e.x += e.vx * delta;
    e.y += e.vy * delta;
    if (e.x < -100 || e.x > 800 || e.y < -100 || e.y > 800) enemys.splice(i, 1);
  }

  // Fake update
  for (let i = fakes.length-1; i >= 0; i--) {
    const f = fakes[i];

    if (f.pause && !f.turned) {
      const reached = f.vx > 0 ? f.x >= f.pauseX : f.x <= f.pauseX;
      if (reached && !f.paused) { f.paused = true; f.pauseTimer = 60; }
      if (f.paused) {
        f.pauseTimer -= delta;
        if (f.pauseTimer <= 0) { f.paused = false; f.turned = true; }
      } else { f.x += f.vx*delta; f.y += f.vy*delta; }
    } else if (f.turn && !f.turned && f.y >= f.turnY) {
      f.vy = 0; f.vx = f.turnVx; f.turned = true;
      f.x += f.vx*delta; f.y += f.vy*delta;
    } else {
      f.x += f.vx*delta; f.y += f.vy*delta;
    }

    if (f.x < -100 || f.x > 800 || f.y < -100 || f.y > 800) {
      fakes.splice(i, 1); continue;
    }

    for (let j = bullets.length-1; j >= 0; j--) {
      const b = bullets[j];
      const dx = (b.x+10)-(f.x+f.size/2);
      const dy = (b.y+10)-(f.y+f.size/2);
      if (dx*dx+dy*dy <= (10+f.size/2)*(10+f.size/2)) {
        fakes.splice(i, 1); bullets.splice(j, 1); combo = 0; break;
      }
    }
  }

  // Collision
  for (let i = enemys.length-1; i >= 0; i--) {
    const e = enemys[i];
    const ecx = e.x+e.size/2, ecy = e.y+e.size/2;

    if (circleCollide(hitboxCX, hitboxCY, hitboxR, ecx, ecy, e.size/2)) {
      if (score > best) { best = score; localStorage.setItem("best_score", best); }
      if (best < 500) grade="iron";
      else if (best < 2200) grade="bronze";
      else if (best < 4200) grade="silver";
      else if (best < 6000) grade="gold";
      else if (best < 7500) grade="platinum";
      else if (best < 9900) grade="emerald";
      else if (best < 13000) grade="diamond";
      else if (best < 17000) grade="master";
      else if (best < 23000) grade="grandmaster";
      else grade="challenger";
      localStorage.setItem("grade", grade);
      localStorage.setItem("attempt", attempt);
      state = "over";
      showNicknameForm();
      loadRanking();
      return;
    }

    for (let j = bullets.length-1; j >= 0; j--) {
      const b = bullets[j];
      const dx = (b.x+10)-ecx, dy = (b.y+10)-ecy;
      if (dx*dx+dy*dy <= (10+e.size/2)*(10+e.size/2)) {
        combo++;
        score += Math.min(800, 100+combo*combo*30);
        playSound(ayaaUrl);
        enemys.splice(i, 1); bullets.splice(j, 1); break;
      }
    }
  }
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  if (state === "game" || state === "over") {
    ctx.fillStyle = "#ff0000";
    ctx.beginPath();
    for (let i = 0; i < bullets.length; i++) {
      const b = bullets[i];
      ctx.moveTo(b.x+20, b.y+10);
      ctx.arc(b.x+10, b.y+10, 10, 0, Math.PI*2);
    }
    ctx.fill();

    ctx.fillStyle = rgby ? "rgb("+R+","+G+","+B+")" : "#ff00ff";
    ctx.beginPath();
    for (let i = 0; i < enemys.length; i++) {
      const e = enemys[i];
      ctx.moveTo(e.x+e.size, e.y+e.size/2);
      ctx.arc(e.x+e.size/2, e.y+e.size/2, e.size/2, 0, Math.PI*2);
    }
    for (let i = 0; i < fakes.length; i++) {
      const f = fakes[i];
      ctx.moveTo(f.x+f.size, f.y+f.size/2);
      ctx.arc(f.x+f.size/2, f.y+f.size/2, f.size/2, 0, Math.PI*2);
    }
    ctx.fill();

    ctx.fillStyle = "#ffff00";
    ctx.beginPath();
    ctx.arc(player_x+playerSize/2, player_y+playerSize/2, playerSize/2, 0, Math.PI*2);
    ctx.arc(hitboxCX, hitboxCY, hitboxR, 0, Math.PI*2);
    ctx.fill();
  }

  if (state === "game") {
    ctx.fillStyle = "#00ff00";
    ctx.font = "bold 40px Malgun Gothic";
    ctx.fillText(String(score).padStart(7,"0"), 0, 40);
    ctx.fillText(String(combo), 0, 85);
    ctx.font = "bold 20px Malgun Gothic";
    ctx.fillText("Press C to change color mode!", 0, 110);
  }

  if (state === "over") {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ffff00";
    ctx.beginPath();
    ctx.arc(player_x+playerSize/2, player_y+playerSize/2, playerSize/2, 0, Math.PI*2);
    ctx.arc(hitboxCX, hitboxCY, hitboxR, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#00ff00";
    ctx.font = "bold 22px Malgun Gothic";
    ctx.fillText("click to restart!", 10, 30);
    ctx.fillText("Best:  "+String(best).padStart(7,"0"), 10, 60);
    ctx.fillText("Score: "+String(score).padStart(7,"0"), 10, 90);
    ctx.fillText("attempt: "+attempt, 10, 120);
    ctx.fillStyle = gradeColors[grade] || "#00ff00";
    ctx.fillText("grade : "+grade, 10, 150);
  }
}

let lastTime = 0;
function loop(timestamp) {
  const delta = Math.min((timestamp - lastTime) / 16.67, 3);
  lastTime = timestamp;
  update(delta);
  draw();
  requestAnimationFrame(loop);
}

async function loadRanking() {
  const ul = document.getElementById("rl");
  try {
    const res = await fetch(SUPA_URL+"/rest/v1/scores?select=nickname,score&order=score.desc&limit=10", {
      headers: { "apikey": SUPA_KEY, "Authorization": "Bearer "+SUPA_KEY }
    });
    const data = await res.json();
    if (!res.ok) { ul.innerHTML = "<li style="color:#555">오류: "+(data.message||res.status)+"</li>"; return; }
    if (!Array.isArray(data) || data.length === 0) { ul.innerHTML = "<li style="color:#555">아직 기록 없음</li>"; return; }
    ul.innerHTML = data.map((r,i) => {
      let color;
      if (r.score<500) color=gradeColors.iron;
      else if (r.score<2200) color=gradeColors.bronze;
      else if (r.score<4200) color=gradeColors.silver;
      else if (r.score<6000) color=gradeColors.gold;
      else if (r.score<7500) color=gradeColors.platinum;
      else if (r.score<9900) color=gradeColors.emerald;
      else if (r.score<13000) color=gradeColors.diamond;
      else if (r.score<17000) color=gradeColors.master;
      else if (r.score<23000) color=gradeColors.grandmaster;
      else color=gradeColors.challenger;
      return "<li><span class="rk">"+(i+1)+"</span><span class="nm" style="color:"+color+"">"+r.nickname+"</span><span class="sc">"+String(r.score).padStart(7,"0")+"</span></li>";
    }).join("");
  } catch(e) { ul.innerHTML = "<li style="color:#555">불러오기 실패</li>"; }
}

function saveName() {
  const name = document.getElementById("ni").value.trim();
  if (!name) return;
  localStorage.setItem("player_name", name);
  document.getElementById("name-setup").style.display = "none";
  document.getElementById("cur-name").style.display = "block";
  document.getElementById("cur-name").textContent = "닉네임: "+name;
}

async function submitScore() {
  const nickname = localStorage.getItem("player_name");
  if (!nickname) return;
  document.getElementById("rs").textContent = "등록 중...";
  try {
    const res = await fetch(SUPA_URL+"/rest/v1/scores", {
      method:"POST",
      headers:{ "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY, "Content-Type":"application/json", "Prefer":"return=minimal" },
      body: JSON.stringify({ nickname, score })
    });
    if (res.ok) { document.getElementById("rs").textContent = "등록 완료!"; loadRanking(); }
    else document.getElementById("rs").textContent = "등록 실패";
  } catch(e) { document.getElementById("rs").textContent = "오류 발생"; }
}

document.getElementById("reset-btn").addEventListener("mouseover", function(){ this.style.color="#ff4444"; this.style.borderColor="#ff4444"; });
document.getElementById("reset-btn").addEventListener("mouseout", function(){ this.style.color="#555"; this.style.borderColor="#333"; });
document.getElementById("reset-btn").addEventListener("click", resetRecord);

function resetRecord() {
  if (!confirm("개인 기록을 초기화할까요? (best, grade, attempt, 닉네임)")) return;
  localStorage.removeItem("best_score");
  localStorage.removeItem("grade");
  localStorage.removeItem("attempt");
  localStorage.removeItem("player_name");
  best = 0; attempt = 0; grade = "bronze";
  document.getElementById("name-setup").style.display = "flex";
  document.getElementById("cur-name").style.display = "none";
  document.getElementById("cur-name").textContent = "";
  document.getElementById("ni").value = "";
  document.getElementById("rs").textContent = "초기화 완료!";
}

function showNicknameForm() {
  const name = localStorage.getItem("player_name");
  if (name) submitScore();
}

(function initName() {
  const name = localStorage.getItem("player_name");
  if (name) {
    document.getElementById("name-setup").style.display = "none";
    document.getElementById("cur-name").style.display = "block";
    document.getElementById("cur-name").textContent = "닉네임: "+name;
  }
})();

player_x = cx + Math.sin(angle)*arcR;
player_y = cy - Math.cos(angle)*arcR;
loadRanking();
setInterval(loadRanking, 30000);
requestAnimationFrame(loop);
</script>
